<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday My Love 🎂❤️</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --pink: #ff4d8d;
      --purple: #1d1230;
      --glass: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Glassmorphism */
    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Floating Animations */
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .heart {
      position: fixed;
      font-size: 20px;
      color: #ff4d8d;
      pointer-events: none;
      z-index: 0;
      animation: heartFall 5s linear forwards;
    }
    @keyframes heartFall {
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .balloon {
      position: absolute;
      width: 40px;
      height: 50px;
      background: var(--pink);
      border-radius: 50%;
      animation: rise 10s infinite ease-in;
      opacity: 0.7;
    }
    @keyframes rise {
      from { transform: translateY(100vh); }
      to { transform: translateY(-20vh); }
    }

    /* Cake Styling */
    .cake-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: auto;
    }
    .cake {
      position: absolute;
      bottom: 0;
      width: 160px;
      height: 100px;
      background: #f48fb1;
      border-radius: 10px 10px 0 0;
      left: 20px;
      box-shadow: inset 0 -10px rgba(0,0,0,0.1);
    }
    .candle {
      position: absolute;
      bottom: 100px;
      left: 95px;
      width: 10px;
      height: 40px;
      background: #fff;
      border-radius: 4px;
    }
    .flame {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 15px;
      height: 20px;
      background: orange;
      border-radius: 50% 50% 20% 20%;
      box-shadow: 0 0 15px orange;
      animation: flicker 0.5s infinite alternate;
    }
    @keyframes flicker {
      from { opacity: 0.8; transform: translateX(-50%) scale(1); }
      to { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    /* Photo Gallery */
    .photo-grid img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 15px;
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    .photo-grid img:hover {
      transform: scale(1.05);
      border: 3px solid var(--pink);
    }

    /* Custom Toast */
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: var(--pink);
      color: #fff;
      text-align: center;
      border-radius: 50px;
      padding: 16px;
      position: fixed;
      z-index: 100;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
    }
    #toast.show {
      visibility: visible;
      animation: fadeInOut 3s;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; bottom: 0; }
      20% { opacity: 1; bottom: 30px; }
      80% { opacity: 1; bottom: 30px; }
      100% { opacity: 0; bottom: 0; }
    }
  </style>
</head>
<body>

  <div id="balloons-container"></div>

  <main class="relative z-10 container mx-auto px-4 py-10">
    
    <section class="text-center mb-16 floating">
      <h1 class="text-6xl md:text-8xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-300">
        Happy Birthday!
      </h1>
      <p class="text-xl md:text-2xl text-pink-200 opacity-90">To the person who fills my heart with joy.</p>
      
      <div class="flex justify-center gap-4 my-8">
        <div class="glass-card p-4 min-w-[80px]">
          <span id="days" class="text-3xl font-bold">00</span>
          <p class="text-xs uppercase">Days</p>
        </div>
        <div class="glass-card p-4 min-w-[80px]">
          <span id="hours" class="text-3xl font-bold">00</span>
          <p class="text-xs uppercase">Hours</p>
        </div>
        <div class="glass-card p-4 min-w-[80px]">
          <span id="minutes" class="text-3xl font-bold">00</span>
          <p class="text-xs uppercase">Mins</p>
        </div>
      </div>

      <button onclick="playMainTheme()" class="btn btn-wide bg-pink-500 hover:bg-pink-600 border-none text-white rounded-full shadow-lg">
        🎵 Play Our Song
      </button>
    </section>

    <section class="glass-card p-10 max-w-2xl mx-auto text-center mb-20">
      <h2 class="text-3xl font-bold mb-6">Make a Wish</h2>
      <div class="cake-container">
        <div class="cake"></div>
        <div class="candle">
          <div id="flame" class="flame"></div>
        </div>
      </div>
      <div class="mt-10 space-x-4">
        <button onclick="blowCandle()" class="btn btn-outline border-pink-400 text-pink-200 hover:bg-pink-500 hover:border-none">
          ✨ Make Wish
        </button>
      </div>
    </section>

    <section class="mb-20">
      <h2 class="text-4xl font-bold text-center mb-12">Our Favorite Memories</h2>
      <div id="gallery" class="photo-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        </div>
    </section>

  </main>

  <div id="toast">Message sent with love! ❤️</div>

  <audio id="audio-player"></audio>

  <script>
    // --- Config & Data ---
    const photoData = [
      { id: 1, song: 'perfect.mp3', msg: 'You are absolutely perfect to me.' },
      { id: 2, song: 'lover.mp3', msg: 'Can I go where you go?' },
      { id: 3, song: 'you-are-in-love.mp3', msg: 'I can hear it in the silence.' },
      { id: 4, song: 'enchanted.mp3', msg: 'It was enchanting to meet you.' },
      { id: 5, song: 'begin-again.mp3', msg: 'On a Wednesday in a cafe...' },
      { id: 6, song: 'love-story.mp3', msg: 'It\'s a love story, baby just say yes.' },
      { id: 7, song: 'paper-rings.mp3', msg: 'I like shiny things, but I\'d marry you with paper rings.' },
      { id: 8, song: 'call-it-what-you-want.mp3', msg: 'You brought a knife to a gunfight.' }
    ];

    const audioPlayer = document.getElementById('audio-player');
    const fallbackImage = "https://images.unsplash.com/photo-1513272795195-985ad360e27e?auto=format&fit=crop&w=800&q=80";

    // --- Audio Logic ---
    function playAudio(filename) {
      audioPlayer.src = filename;
      audioPlayer.play().catch(e => {
        showToast("Audio file missing: " + filename);
        console.error("Audio block:", e);
      });
    }

    function playMainTheme() {
      playAudio('wanna-be-yours.mp3');
      showToast("Now Playing: Wanna Be Yours 🎵");
      triggerConfetti();
    }

    function blowCandle() {
      const flame = document.getElementById('flame');
      flame.style.display = 'none';
      playAudio('happy-birthday.mp3');
      showToast("Happy Birthday! All your wishes come true! 🎂");
      triggerConfetti();
    }

    // --- Gallery Logic ---
    const gallery = document.getElementById('gallery');
    photoData.forEach(item => {
      const div = document.createElement('div');
      div.className = 'text-center';
      div.innerHTML = `
        <div class="glass-card p-2">
          <img src="photo${item.id}.jpg" 
               onerror="this.src='${fallbackImage}'" 
               onclick="handlePhotoClick('${item.song}', '${item.msg}')" 
               alt="Memory ${item.id}">
          <p class="mt-4 text-sm italic text-pink-200">${item.msg}</p>
        </div>
      `;
      gallery.appendChild(div);
    });

    function handlePhotoClick(song, msg) {
      playAudio(song);
      showToast(msg);
      createHearts();
    }

    // --- Visual Effects ---
    function showToast(text) {
      const t = document.getElementById("toast");
      t.innerText = text;
      t.className = "show";
      setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
    }

    function triggerConfetti() {
      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#ff4d8d', '#ffffff', '#ffd700']
      });
    }

    function createHearts() {
      for (let i = 0; i < 15; i++) {
        setTimeout(() => {
          const heart = document.createElement('div');
          heart.innerHTML = '❤️';
          heart.className = 'heart';
          heart.style.left = Math.random() * 100 + 'vw';
          heart.style.top = '-5vh';
          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 5000);
        }, i * 100);
      }
    }

    function spawnBalloons() {
      const container = document.getElementById('balloons-container');
      for (let i = 0; i < 10; i++) {
        const b = document.createElement('div');
        b.className = 'balloon';
        b.style.left = Math.random() * 100 + 'vw';
        b.style.animationDelay = Math.random() * 5 + 's';
        b.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 70%)`;
        container.appendChild(b);
      }
    }

    // --- Countdown Timer ---
    function updateCountdown() {
      const now = new Date();
      // Set to the end of today or a specific date
      const target = new Date();
      target.setHours(23, 59, 59);
      
      const diff = target - now;
      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diff / 1000 / 60) % 60);

      document.getElementById('days').innerText = d < 10 ? '0' + d : d;
      document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
      document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
    }

    // Initialize
    setInterval(updateCountdown, 1000);
    spawnBalloons();
  </script>
</body>
</html>
